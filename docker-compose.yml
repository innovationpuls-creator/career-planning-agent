# ============================================
# Career Planning Agent - Docker Compose
# ============================================
# Usage:
#   1. cp deploy/.env.example .env   # edit APP_SECRET_KEY
#   2. docker compose up -d
# ============================================

services:
  # ---- Neo4j (Knowledge Graph) ----
  neo4j:
    image: neo4j:5-community
    container_name: career-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-change-me-on-deployment}
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USERNAME:-neo4j} -p ${NEO4J_PASSWORD:-change-me-on-deployment} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - career-network

  # ---- Qdrant (Vector Database) ----
  qdrant:
    image: qdrant/qdrant:latest
    container_name: career-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - career-network

  # ---- Backend (FastAPI) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: career-backend
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      DOCKER_ENV: "true"
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      SQLITE_URL: sqlite:///data/app.db
      # --- Neo4j (Docker service name) ---
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change-me-on-deployment}
      NEO4J_DATABASE: neo4j
      # --- CORS (include domain for production access) ---
      CORS_ORIGINS: "http://127.0.0.1:8000,http://localhost:8000,http://127.0.0.1:9100,http://localhost:9100,http://127.0.0.1:9000,http://localhost:9000,http://${APP_DOMAIN},https://${APP_DOMAIN}"
      # --- Qdrant (connect to Docker service) ---
      QDRANT_URL: http://qdrant:6333
      QDRANT_PATH: data/qdrant
      QDRANT_JOB_GROUP_COLLECTION_NAME: job_group_embeddings
      QDRANT_CAREER_GROUP_COLLECTION_NAME: career_group_embeddings
      # --- AI Services (optional — app starts without these) ---
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      DIFY_BASE_URL: ${DIFY_BASE_URL:-}
      DIFY_API_KEY: ${DIFY_API_KEY:-}
      USE_LOCAL_COMPETENCY_PROFILE: ${USE_LOCAL_COMPETENCY_PROFILE:-true}
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    networks:
      - career-network

  # ---- Nginx (serves frontend + proxies API/static to backend) ----
  nginx:
    build:
      context: .
      dockerfile: deploy/Dockerfile.nginx
    container_name: career-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - career-network

networks:
  career-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_storage:
  backend_data:
